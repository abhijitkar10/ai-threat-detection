version: '3.8'

services:

  db:
    image: mysql:8
    container_name: threat_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: threatdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql   # ← ADD THIS

  ml-service:
    build: ./ml-service
    container_name: ml_service
    depends_on:
      - db
    ports:
      - "8000:8000"

  dashboard:
    build: ./dashboard
    container_name: dashboard
    depends_on:
      - db
      - ml-service
    ports:
      - "5050:5000"

volumes:
  mysql_data: